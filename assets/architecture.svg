<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#666"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff6b35"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="700" height="480" fill="url(#archBg)" rx="12"/>
  <rect width="700" height="480" fill="none" stroke="#333" stroke-width="1" rx="12"/>

  <!-- Title -->
  <text x="350" y="36" font-family="'Arial', sans-serif" font-size="16" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="2">GITROAST ARCHITECTURE</text>
  <line x1="120" y1="48" x2="580" y2="48" stroke="#333" stroke-width="1"/>

  <!-- ===== VS Code Extension Box ===== -->
  <rect x="200" y="64" width="300" height="52" rx="8" fill="#0d2233" stroke="#4fc3f7" stroke-width="2"/>
  <text x="350" y="85" font-family="'Arial', sans-serif" font-size="13" font-weight="700"
        fill="#4fc3f7" text-anchor="middle">VS Code Extension</text>
  <text x="350" y="103" font-family="'Arial', sans-serif" font-size="11"
        fill="#4fc3f788" text-anchor="middle">TypeScript • Sidebar • Chat • Inline Comments</text>

  <!-- Arrow VS Code → MCP Protocol label -->
  <line x1="350" y1="116" x2="350" y2="148" stroke="#666" stroke-width="1.5"
        stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="370" y="136" font-family="'Arial', sans-serif" font-size="10"
        fill="#666" text-anchor="start">MCP Protocol (stdio)</text>

  <!-- ===== MCP Server Box ===== -->
  <rect x="130" y="152" width="440" height="52" rx="8" fill="#1e1200" stroke="#ff6b35" stroke-width="2"/>
  <text x="350" y="173" font-family="'Arial', sans-serif" font-size="13" font-weight="700"
        fill="#ff6b35" text-anchor="middle">MCP Server</text>
  <text x="350" y="191" font-family="'Arial', sans-serif" font-size="11"
        fill="#ff6b3588" text-anchor="middle">Python 3.11+ • stdio transport • 8 tools registered</text>

  <!-- Arrow MCP → Orchestrator -->
  <line x1="350" y1="204" x2="350" y2="230" stroke="#ff6b35" stroke-width="1.5"
        marker-end="url(#arrowOrange)"/>

  <!-- ===== Orchestrator Box ===== -->
  <rect x="225" y="234" width="250" height="44" rx="7" fill="#1d1200" stroke="#f7a128" stroke-width="1.5"/>
  <text x="350" y="252" font-family="'Arial', sans-serif" font-size="12" font-weight="700"
        fill="#f7a128" text-anchor="middle">Orchestrator Agent</text>
  <text x="350" y="269" font-family="'Arial', sans-serif" font-size="10"
        fill="#f7a12888" text-anchor="middle">Session cache • Conversation history • Routing</text>

  <!-- Arrows Orchestrator → Tools (fan out) -->
  <!-- Left-most line -->
  <line x1="260" y1="278" x2="80" y2="328" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Second -->
  <line x1="308" y1="278" x2="202" y2="328" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Center -->
  <line x1="350" y1="278" x2="350" y2="328" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Fourth -->
  <line x1="392" y1="278" x2="498" y2="328" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <!-- Right-most -->
  <line x1="430" y1="278" x2="622" y2="328" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ===== 5 Tool Boxes ===== -->
  <!-- GitHub Scraper -->
  <rect x="20" y="332" width="120" height="50" rx="6" fill="#0a1f0a" stroke="#4caf50" stroke-width="1.5"/>
  <text x="80" y="351" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#4caf50" text-anchor="middle">GitHub</text>
  <text x="80" y="365" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#4caf50" text-anchor="middle">Scraper</text>
  <text x="80" y="377" font-family="'Arial', sans-serif" font-size="9"
        fill="#4caf5066" text-anchor="middle">Phase 1</text>

  <!-- Code Analyzer -->
  <rect x="150" y="332" width="120" height="50" rx="6" fill="#1a0d1a" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="210" y="351" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#ce93d8" text-anchor="middle">Code</text>
  <text x="210" y="365" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#ce93d8" text-anchor="middle">Analyzer</text>
  <text x="210" y="377" font-family="'Arial', sans-serif" font-size="9"
        fill="#ce93d866" text-anchor="middle">Phase 2</text>

  <!-- Idea Debater -->
  <rect x="290" y="332" width="120" height="50" rx="6" fill="#001a1a" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="350" y="351" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#4fc3f7" text-anchor="middle">Idea</text>
  <text x="350" y="365" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#4fc3f7" text-anchor="middle">Debater</text>
  <text x="350" y="377" font-family="'Arial', sans-serif" font-size="9"
        fill="#4fc3f766" text-anchor="middle">Phase 3</text>

  <!-- Scaffolder -->
  <rect x="430" y="332" width="120" height="50" rx="6" fill="#1a1000" stroke="#ffb74d" stroke-width="1.5"/>
  <text x="490" y="351" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#ffb74d" text-anchor="middle">Project</text>
  <text x="490" y="365" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#ffb74d" text-anchor="middle">Scaffolder</text>
  <text x="490" y="377" font-family="'Arial', sans-serif" font-size="9"
        fill="#ffb74d66" text-anchor="middle">Phase 3</text>

  <!-- Competitor Researcher -->
  <rect x="565" y="332" width="120" height="50" rx="6" fill="#1a0a00" stroke="#ff6b35" stroke-width="1.5"/>
  <text x="625" y="351" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#ff6b35" text-anchor="middle">Competitor</text>
  <text x="625" y="365" font-family="'Arial', sans-serif" font-size="10" font-weight="700"
        fill="#ff6b35" text-anchor="middle">Researcher</text>
  <text x="625" y="377" font-family="'Arial', sans-serif" font-size="9"
        fill="#ff6b3566" text-anchor="middle">Phase 4 ✅</text>

  <!-- Arrow from all tools → Personality Engine -->
  <line x1="80" y1="382" x2="290" y2="430" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="210" y1="382" x2="320" y2="430" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="350" y1="382" x2="350" y2="430" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="490" y1="382" x2="380" y2="430" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="625" y1="382" x2="410" y2="430" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== Personality Engine Box ===== -->
  <rect x="200" y="432" width="300" height="40" rx="7" fill="#0d1a0d" stroke="#f7c948" stroke-width="1.5"/>
  <text x="350" y="449" font-family="'Arial', sans-serif" font-size="12" font-weight="700"
        fill="#f7c948" text-anchor="middle">Personality Engine</text>
  <text x="350" y="464" font-family="'Arial', sans-serif" font-size="10"
        fill="#f7c94888" text-anchor="middle">Comedian • YC Founder • Senior Dev • Zen • Stranger</text>

  <!-- Groq API label (bottom right) -->
  <rect x="570" y="432" width="110" height="40" rx="6" fill="#001010" stroke="#00bcd4" stroke-width="1"/>
  <text x="625" y="449" font-family="'Arial', sans-serif" font-size="11" font-weight="700"
        fill="#00bcd4" text-anchor="middle">Groq LLM</text>
  <text x="625" y="464" font-family="'Arial', sans-serif" font-size="9"
        fill="#00bcd488" text-anchor="middle">llama3-70b • Free</text>
</svg>
