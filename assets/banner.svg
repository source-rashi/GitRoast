<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d0d1a;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#f7a128;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f7c948;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#f7c948;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f7c948;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="flameGradBanner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f7c948;stop-opacity:1"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flameGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern overlay -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="200" fill="url(#grid)"/>

  <!-- Flame icon (left of title) -->
  <g transform="translate(140, 40) scale(0.55)" filter="url(#flameGlow)">
    <path d="
      M 60 165
      C 36 165 18 146 18 124
      C 18 105 28 90 36 78
      C 40 72 42 64 40 54
      C 45 64 47 72 44 82
      C 50 72 54 58 52 44
      C 58 60 59 72 56 84
      C 62 72 65 56 64 42
      C 70 58 71 72 68 86
      C 75 72 79 56 78 40
      C 85 58 83 76 76 90
      C 84 82 90 68 88 54
      C 96 72 93 92 84 106
      C 92 100 98 84 96 68
      C 104 88 100 110 90 122
      C 98 118 104 104 102 88
      C 110 108 107 130 97 142
      C 90 155 76 164 60 164
      Z
    " fill="url(#flameGradBanner)"/>
  </g>

  <!-- GitRoast main title -->
  <text
    x="280"
    y="115"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#titleGrad)"
    text-anchor="middle"
    letter-spacing="-1"
    filter="url(#textGlow)"
  >GitRoast</text>

  <!-- Subtitle -->
  <text
    x="280"
    y="148"
    font-family="'Arial', 'Helvetica', sans-serif"
    font-size="16"
    font-weight="400"
    fill="#888888"
    text-anchor="middle"
    letter-spacing="4"
  >AI DEVELOPER INTELLIGENCE</text>

  <!-- Right side decorative elements -->
  <!-- MCP badge -->
  <rect x="500" y="65" width="90" height="24" rx="12" fill="#ff6b35" opacity="0.15"/>
  <rect x="500" y="65" width="90" height="24" rx="12" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.5"/>
  <text x="545" y="81" font-family="'Arial', sans-serif" font-size="11" fill="#ff6b35" text-anchor="middle" font-weight="600" letter-spacing="1">MCP POWERED</text>

  <!-- Free badge -->
  <rect x="600" y="65" width="70" height="24" rx="12" fill="#4caf50" opacity="0.15"/>
  <rect x="600" y="65" width="70" height="24" rx="12" fill="none" stroke="#4caf50" stroke-width="1" opacity="0.5"/>
  <text x="635" y="81" font-family="'Arial', sans-serif" font-size="11" fill="#4caf50" text-anchor="middle" font-weight="600" letter-spacing="1">100% FREE</text>

  <!-- Feature list right side -->
  <text x="510" y="110" font-family="'Arial', sans-serif" font-size="12" fill="#666" letter-spacing="0.5">🔥 GitHub Profile Roast</text>
  <text x="510" y="128" font-family="'Arial', sans-serif" font-size="12" fill="#666" letter-spacing="0.5">🔬 Code Quality Analysis</text>
  <text x="510" y="146" font-family="'Arial', sans-serif" font-size="12" fill="#666" letter-spacing="0.5">🧠 Idea Stress Test</text>
  <text x="510" y="164" font-family="'Arial', sans-serif" font-size="12" fill="#666" letter-spacing="0.5">🕵️ Competitor Research</text>

  <!-- Bottom gradient line -->
  <rect x="0" y="192" width="800" height="3" fill="url(#lineGrad)" rx="1.5"/>

  <!-- Top subtle line -->
  <rect x="0" y="5" width="800" height="1" fill="url(#lineGrad)" opacity="0.3"/>
</svg>
